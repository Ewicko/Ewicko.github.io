{{ define "main" }}
<div class="container-wide">
  <h1>{{ .Title }}</h1>
  <div class="projects-grid">
    {{ range .Pages.ByWeight }}
    {{ $pageTitle := .Title }}
    <a class="project-card" href="{{ if .Params.external_url }}{{ .Params.external_url }}{{ else }}{{ .RelPermalink }}{{ end }}"
       {{ if .Params.external_url }}target="_blank" rel="noopener"{{ end }}>
      {{ with .Params.thumbnail }}
      <img class="thumb" src="{{ . }}" alt="{{ $pageTitle }}" loading="lazy" decoding="async">
      {{ end }}
      <div class="card-body">
        <div class="card-title">{{ .Title }}</div>
        <p class="card-desc">{{ .Description }}</p>
        <div class="project-tags">
          {{ range .Params.tags }}
          <span class="project-tag">{{ . }}</span>
          {{ end }}
        </div>
      </div>
    </a>
    {{ end }}
  </div>
</div>
{{ end }}
